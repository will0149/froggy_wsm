name: froggy_soft
description: "App for logistic management"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  #Manage svg files
  flutter_svg: ^2.1.0
  # lottie files
  lottie: ^3.3.1
  # shared preference to caching variables
  shared_preferences: ^2.5.3
  # class for routing app pages
  go_router: ^15.1.2
  # to load skeleton loadings
  skeletonizer: ^2.0.1
  # riverpod dependencies
  flutter_riverpod: ^2.6.1
  date_field: ^6.0.3+1
  riverpod_annotation: ^2.6.1
  http: ^1.4.0
  # dependencia para objetos deserializables DTOs
  json_annotation: ^4.9.0
  flutter_input_chips: ^1.1.0
  fluttertoast: ^8.2.12
  input_quantity: ^2.5.1
  connectivity_plus: ^6.1.4 #validate internet connection
  intl: ^0.20.2
  stack_trace: ^1.12.1
  logger: ^2.5.0
  package_info_plus: ^8.3.0 #device information
  url_launcher: ^6.3.1 #use for launch hyperlinks
  flutter_localization: ^0.3.2
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.2 # For SQLite database operations
#  path: ^1.9.1       # For handling file paths
  horizontal_scroll_item:
    path: ../../horizontal_scroll_item
dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  flutter_flavorizr: ^2.4.1 # use for app flavors
  riverpod_generator: ^2.6.5
  # dependencia dev para objetos deserializables DTOs
  json_serializable: ^6.9.5

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/froggy_banner.jpeg
    - assets/warehouse.png
    - assets/logo.png
    - assets/maintainance/no_internet.json
    - assets/maintainance/maintenance.json
    - assets/logos/
    - assets/logos/cct_logo.png
    - assets/logos/atheneox.png
    - assets/maintainance/settings.png
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
fonts:
 - family: Ubuntu
   fonts:
     - asset: assets/fonts/Ubuntu-Regular.ttf
       style: normal
     - asset: assets/fonts/Ubuntu-Bold.ttf
       style: bold
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
flutter_intl:
  enabled: true # TODO: poner en false cuando no se agreguen nuevos textos
  main_locale: es
  class_name: S # TODO: puede llamarse app_localization
    #arb_dir: lib/l10n
  #output_dir: lib/generated
